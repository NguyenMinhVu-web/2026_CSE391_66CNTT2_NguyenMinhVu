<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Bài về nhà 2 - Multi Step Form</title>
<link rel="stylesheet" href="baivenha2.css">
</head>

<body>

<div class="container">

<h2>Form đăng ký</h2>

<div class="progress">
<div id="progressBar"></div>
</div>

<form id="form">

<!-- STEP 1 -->

<div class="step active">

<h3>Bước 1: Thông tin cá nhân</h3>

<label>Họ và tên</label>
<input type="text" id="fullname">

<label>Ngày sinh</label>
<input type="date" id="birthday">

<label>Giới tính</label>

<div class="gender">
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>
</div>

<button type="button" id="next1">Tiếp theo</button>

</div>


<!-- STEP 2 -->

<div class="step">

<h3>Bước 2: Thông tin tài khoản</h3>

<label>Email</label>
<input type="text" id="email">

<label>Mật khẩu</label>
<input type="password" id="password">

<label>Xác nhận mật khẩu</label>
<input type="password" id="confirm">

<div class="buttons">

<button type="button" id="back1">Quay lại</button>
<button type="button" id="next2">Tiếp theo</button>

</div>

</div>


<!-- STEP 3 -->

<div class="step">

<h3>Bước 3: Xác nhận</h3>

<div id="summary"></div>

<div class="buttons">

<button type="button" id="back2">Quay lại</button>
<button type="submit">Đăng ký</button>

</div>

</div>

</form>

</div>

<script src="baivenha2.js"></script>

</body>
</html>
