<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 1 - Flexbox Form</title>
    <link rel="stylesheet" href="bt01.css">
</head>
<body>

<div class="wrapper">
    <h2>Get in touch with us by filling contact form below</h2>

    <form class="contact-form">
        
        <!-- Hàng 1 -->
        <div class="row">
            <input type="text" placeholder="* Enter your full name">
            <input type="email" placeholder="* Enter your email address">
        </div>

        <!-- Subject -->
        <input type="text" class="full" placeholder="Enter your subject">

        <!-- Message -->
        <textarea class="full" rows="8" placeholder="* Your message here..."></textarea>

        <!-- Hàng cuối -->
        <div class="bottom-row">
            <button type="submit">Send message</button>
            <p>* Please fill all required form field, thanks!</p>
        </div>

    </form>
</div>

</body>
</html>
